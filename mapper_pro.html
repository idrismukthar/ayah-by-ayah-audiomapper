<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Athar Mapper Pro - Pioneer Edition</title>
    <style>
        :root { --gold: #c5a059; --bg: #121212; --panel: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); text-align: center; }
        .main { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar for Folder Files */
        .sidebar { width: 250px; background: var(--panel); border-right: 1px solid #333; overflow-y: auto; padding: 10px; }
        .file-item { padding: 8px; margin: 4px 0; background: #2a2a2a; cursor: pointer; border-radius: 4px; font-size: 0.85rem; }
        .file-item:hover { background: #3a3a3a; }
        .file-item.active { border-left: 4px solid var(--gold); background: #333; }

        /* Workspace */
        .workspace { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controls { margin: 20px 0; display: flex; gap: 10px; }
        .btn { background: #333; border: 1px solid #555; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: var(--gold); color: black; }
        .btn-stamp { background: var(--gold); color: black; font-weight: bold; width: 300px; height: 60px; font-size: 1.2rem; }
        
        #log { width: 100%; max-width: 600px; background: #000; flex: 1; overflow-y: auto; border-radius: 8px; padding: 15px; font-family: monospace; border: 1px solid #333; }
        .stamp-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #222; }
        .hotkey-list { font-size: 0.8rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; color:var(--gold);">ATHAR MAPPER PRO</h2>
    <div class="hotkey-list">K: Play | P: Pause | SPACE: Stamp | Z: Undo | D: Delete/Rewind | S: Save JSON</div>
</header>

<div class="main">
    <div class="sidebar" id="fileList">
        <h4 style="margin-top:0">Surah Folder</h4>
        <input type="file" id="folderInput" webkitdirectory directory multiple>
        <div id="listItems" style="margin-top:10px"></div>
    </div>

    <div class="workspace">
        <h3 id="currentSurahTitle">Select a Surah from sidebar</h3>
        <audio id="player" preload="auto"></audio>
        
        <div class="controls">
            <button class="btn" onclick="togglePlay()">Play/Pause (K/P)</button>
            <button class="btn" onclick="undo()">Undo (Z)</button>
            <button class="btn" onclick="deleteAndRewind()">Delete & Rewind (D)</button>
        </div>

        <button class="btn btn-stamp" onclick="markAyah()">STAMP AYAH (SPACE)</button>

        <div id="log"></div>
        
        <div class="controls">
            <button class="btn" style="background: #28a745; color: white;" onclick="exportJSON()">💾 SAVE TIMESTAMPS (S)</button>
        </div>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const folderInput = document.getElementById('folderInput');
    const listItems = document.getElementById('listItems');
    const log = document.getElementById('log');
    const title = document.getElementById('currentSurahTitle');

    let currentFileName = "surah";
    let stamps = [];

    // Folder Loading
    folderInput.onchange = (e) => {
        const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/'));
        listItems.innerHTML = '';
        files.forEach(file => {
            let div = document.createElement('div');
            div.className = 'file-item';
            div.innerText = file.name;
            div.onclick = () => loadAudio(file);
            listItems.appendChild(div);
        });
    };

    function loadAudio(file) {
        player.src = URL.createObjectURL(file);
        currentFileName = file.name.split('.')[0];
        title.innerText = `Mapping: ${file.name}`;
        stamps = [];
        updateLog();
        player.play();
    }

    function togglePlay() { player.paused ? player.play() : player.pause(); }

    function markAyah() {
        if (!player.src || player.paused) return;
        let lastEnd = stamps.length > 0 ? stamps[stamps.length - 1].end : 0;
        stamps.push({
            ayah: stamps.length + 1,
            start: parseFloat(lastEnd).toFixed(2),
            end: player.currentTime.toFixed(2)
        });
        updateLog();
    }

    function undo() {
        stamps.pop();
        updateLog();
    }

    function deleteAndRewind() {
        if (stamps.length === 0) return;
        let last = stamps.pop();
        player.currentTime = last.start; // Jump back to start of that verse
        updateLog();
    }

    function updateLog() {
        log.innerHTML = stamps.map(s => `
            <div class="stamp-row">
                <span>Ayah ${s.ayah}</span>
                <span style="color:var(--gold)">${s.start}s - ${s.end}s</span>
            </div>
        `).join('');
        log.scrollTop = log.scrollHeight;
    }

    function exportJSON() {
        let output = {
            surah_name: currentFileName,
            reciter: "Abdul Rashid Ali Sufi",
            riwayah: "Khalaf 'an Hamzah",
            timestamps: stamps
        };
        const blob = new Blob([JSON.stringify(output, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentFileName}_timestamps.json`;
        a.click();
    }

    // Fixed Keyboard Listeners
    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === ' ') { e.preventDefault(); markAyah(); }
        if (key === 'k') { player.play(); }
        if (key === 'p') { player.pause(); }
        if (key === 'z') { undo(); }
        if (key === 'd') { deleteAndRewind(); }
        if (key === 's') { exportJSON(); }
    });
</script>
</body>
</html>
